<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha loja virtual de instrumentos</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main id="geral">
    <header id="cabecalho">
        <div id="logo">
            Sua Loja
        </div>

        <nav id="menu">
            <ul>
                <li><a href="/index.html">Inicial</a></li>
                <li><a href="paginas/cadastro.html">Cadastro</a></li>
                <li><a href="paginas/sobre.html">Sobre</a></li>
                <li><a href="paginas/login.html">Login</a></li>
                <li><a href="/paginas/categorias.html">Categorias</a></li>
                <li><a href="paginas/carrinho"><img src="/imagens/carrinho.png" alt="carrinho"></a></li>
                </ul>
        </nav>
    </header>
    
    <section id="pesquisa">
        <input type="text"
        name="pesquisa"
        id="campo-pesquisa"
        class="input-pesquisa"
        placeholder="Digite seu produto">
    </section>

    <section id="cards">
        <div class="card">
            <img src="/imagens/bateria.jpg" alt="bateria">
            <p>Bateria</p>
            <h2>R$ 4.758,90</h2>
            <button class="btn-add">Adicionar</button>
        </div>
        
        <div class="card">
            <img src="/imagens/triângulo.jpg" alt="triangulo">
            <p>Triângulo</p>
            <h2>R$ 70,90</h2>
            <button class="btn-add">Adicionar</button>
        </div>

        <div class="card">
            <img src="/imagens/gaita.jpg" alt="gaita">
            <p>Pandeiro</p>
            <h2>R$ 122,50</h2>
            <button class="btn-add">Adicionar</button>
        </div>
    </section>
    
    <footer id="rodapé">
        <h2>&copy 2026 SuaLoja S.A. Todos os direitos reservados</h2>
        <p>Formas de pagamento: Pix, Cartões de Débito e Crédito</p>
    </footer>

</main>

</body>
</html>
