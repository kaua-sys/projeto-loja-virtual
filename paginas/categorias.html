<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha loja virtual de instrumentos</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                Sua Loja
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="/index.html">Inicial</a></li>
                    <li><a href="paginas/cadastro.html">Cadastro</a></li>
                    <li><a href="paginas/sobre.html">Sobre</a></li>
                    <li><a href="paginas/login.html">Login</a></li>
                    <li><a href="paginas/categorias.html">Categorias</a></li>
                    <li><a href="paginas/carrinho"><img src="/imagens/carrinho.png" alt="carrinho"></a></li>
                </ul>
            </nav>
        </header>

         <section id="pesquisa">
            <input type="text"
            name="pesquisa"
            id="campo-pesquisa" 
            class="input-pesquisa"
            placeholder="Digite seu produto">
        </section>

    <section id="tipo">
        <div class ="tipo-card">
            <a href="/paginas/cordas.html">
                <img src="/imagens/violão.jpg" alt="Instrumentos de corda">
                <p>Cordas</p>
                <button class="btn-add">Entrar</button>
            </a>
        </div>

        <div class = "tipo-card">
            <a href="/paginas/sopro.html">
                <img src="/imagens/flauta transversal.jpg" alt="Instrumentos de sopro">
                <p>Sopro</p>
                <button class="btn-add">Entrar</button>
            </a>
        </div>


    </section>
</body>
</html>
