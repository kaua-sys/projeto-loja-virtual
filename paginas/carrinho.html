<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras | Sua Loja</title>

    <link rel="stylesheet" href="/css/style_carrinho.css">
    <link rel="shortcut icon" href="/imagens/Harmonia musical.png" type="image/png">

    <script src="../js/tela_carrinho.js" type="module" defer></script>
</head>

<body>

    <main id="geral">

        <!-- Cabeçalho -->
        <header id="cabecalho">

            <div id="logo">
                <h1>Sua Loja</h1>
            </div>

            <nav id="menu" aria-label="Menu principal">
                <ul>
                    <li><a href="../index.html">Inicial</a></li>
                    <li><a href="/paginas/cadastro.html">Cadastro</a></li>
                    <li><a href="/paginas/sobre.html">Sobre</a></li>
                    <li><a href="/paginas/login.html">Login</a></li>
                    <li><a href="/paginas/categorias.html">Categorias</a></li>

                    <li>
                        <a href="/paginas/carrinho.html" aria-label="Carrinho de compras">
                            <img src="/imagens/carrinho.png" alt="Carrinho">
                        </a>
                    </li>
                </ul>
            </nav>

        </header>

        <!-- Carrinho -->
        <section id="compra">

            <h2>🛒 Carrinho de Compras</h2>

            <div class="carrinho">

                <!-- Produtos -->
                <section class="produtos" id="itens-carrinho">

                    <!--
                        Os produtos serão adicionados aqui pelo JavaScript.
                    -->

                </section>

                <!-- Resumo -->
                <aside class="resumo">

                    <h3>Resumo do Pedido</h3>

                    <div class="cep">

                        <label for="cep">
                            CEP para entrega
                        </label>

                        <input
                            type="text"
                            id="cep"
                            placeholder="00000-000">

                        <button id="btn-frete">
                            Calcular Frete
                        </button>

                    </div>

                    <hr>

                    <div class="totais">

                        <p>
                            Produtos
                            <strong id="valor-produtos">
                                R$ 0,00
                            </strong>
                        </p>

                        <p>
                            Frete
                            <strong id="valor-frete">
                                R$ 10,00
                            </strong>
                        </p>

                        <hr>

                        <p class="total">
                            Total
                            <strong id="valor-total">
                                R$ 0,00
                            </strong>
                        </p>

                    </div>

                    <div class="botoes">

                        <button
                            class="continuar"
                            onclick="window.location.href='../index.html'">
                            ← Continuar Comprando
                        </button>

                        <button class="finalizar">
                            Finalizar Compra
                        </button>

                    </div>

                </aside>

            </div>

        </section>

        <!-- Rodapé -->
        <footer id="rodape">

            <h2>&copy; 2026 SuaLoja S.A.</h2>

            <p>Todos os direitos reservados.</p>

            <p>
                Formas de pagamento:
                Pix, Cartões de Débito e Crédito.
            </p>

        </footer>

    </main>

</body>

</html>
